<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .div1 {
      background-color: lightblue;
      font-size: 20px;
    }

    .div2 {
      background-color: lightcoral;
      font-size: 22px;
    }

    .p1 {
      background-color: lightgreen;
      font-size: 18px;
    }

    .p2 {
      background-color: lightpink;
      font-size: 16px;
    }

    .span1 {
      background-color: yellow;
      font-size: 14px;
    }

    .span2 {
      background-color: orange;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="div1">This is first div</div>
  <div class="div2">This is second div</div>

  <p class="p1">This is first paragraph</p>
  <p class="p2">This is second paragraph</p>

  <span class="span1">This is first span</span>
  <span class="span2">This is second span</span>

</body>
</html>
